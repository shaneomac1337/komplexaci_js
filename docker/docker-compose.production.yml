# Production compose — pulls a pre-built image from GHCR (built by
# .github/workflows/docker-publish.yml on every push to master).
# Deploy: docker compose -f docker-compose.production.yml pull
#         docker compose -f docker-compose.production.yml up -d
services:
  komplexaci-app:
    image: ghcr.io/shaneomac1337/komplexaci_js:latest
    container_name: komplexaci-web
    restart: unless-stopped
    # Host networking for direct access to host services.
    network_mode: host
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ANALYTICS_DATA_DIR=/app/data
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - analytics-data:/app/data
    healthcheck:
      # Alpine ships BusyBox wget — --spider does a HEAD-style existence check.
      # The GNU --no-verbose / --tries / --method flags break under BusyBox.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  analytics-data:
    driver: local
